<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LetsBet ⚡</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0f1923; color:white; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    input::placeholder, textarea::placeholder { color:#6b7280; }
    * { -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ── Estado ────────────────────────────────────────────────
let page = 'home';
let CONFIG = null;           // carregado da URL ou nulo
let nomeAposta = '', p1 = '', p2 = '';
let logoClicks = 0, logoTimer = null;
const ADMIN_PASS_KEY = 'letsbet_admin_pass';

// ── Carrega config da URL (#hash) ─────────────────────────
function loadConfig() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  try { return JSON.parse(atob(hash)); } catch(e) { return null; }
}

// ── Navegação ─────────────────────────────────────────────
function go(p, data) {
  page = p;
  if (data) {
    if (data.nome !== undefined) nomeAposta = data.nome;
    if (data.p1  !== undefined) { p1 = data.p1; p2 = data.p2; }
  }
  render();
  window.scrollTo(0, 0);
}

function onLogo() {
  logoClicks++;
  clearTimeout(logoTimer);
  logoTimer = setTimeout(() => logoClicks = 0, 2000);
  if (logoClicks >= 5) { logoClicks = 0; go('admin-login'); }
}

// ── Componentes ───────────────────────────────────────────
function logo(big) {
  return `<div class="flex items-center ${big?'gap-3':'gap-2'} cursor-pointer select-none" onclick="onLogo()">
    <div style="background:#ff6d00;width:${big?'40px':'28px'};height:${big?'40px':'28px'};font-size:${big?'20px':'14px'}" class="flex items-center justify-center rounded-lg">⚡</div>
    <span style="font-size:${big?'28px':'20px'}" class="font-black tracking-tight"><span class="text-white">Lets</span><span style="color:#00e676">Bet</span></span>
  </div>`;
}

function inputStyle() { return 'width:100%;border:1px solid rgba(255,255,255,0.1);background:#1e2d3d;color:white;border-radius:12px;padding:12px 16px;font-size:14px;outline:none;'; }

// ── Página Inicial ────────────────────────────────────────
function pageHome() {
  if (!CONFIG) return `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="margin-bottom:32px">${logo(true)}</div>
      <div style="background:#1e2d3d;border-radius:20px;padding:32px;max-width:380px;border:1px solid rgba(255,255,255,0.05)">
        <div style="font-size:48px;margin-bottom:12px">⚙️</div>
        <h2 style="font-weight:800;font-size:18px;margin-bottom:8px">Nenhum bolão configurado</h2>
        <p style="color:#9ca3af;font-size:14px;margin-bottom:16px">Se você é o organizador, clique no logo <strong style="color:#00e676">⚡ 5 vezes</strong> para acessar o painel.</p>
        <p style="color:#6b7280;font-size:12px">Os participantes devem usar o link gerado pelo organizador.</p>
      </div>
    </div>`;

  if (!CONFIG.ativo) return `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="margin-bottom:32px">${logo(true)}</div>
      <div style="background:#1e2d3d;border-radius:20px;padding:32px;max-width:380px">
        <div style="font-size:48px;margin-bottom:12px">🔒</div>
        <h2 style="font-weight:800;font-size:18px;margin-bottom:8px">Bolão Encerrado</h2>
        <p style="color:#9ca3af;font-size:14px">As apostas foram encerradas. Obrigado a todos!</p>
      </div>
    </div>`;

  const [time1, time2] = CONFIG.jogo.split(' x ');
  return `
    <div style="min-height:100vh;padding:32px 16px;max-width:480px;margin:0 auto">
      <div style="margin-bottom:32px">${logo(true)}</div>

      <div style="background:#1e2d3d;border-radius:20px;padding:20px;border:1px solid rgba(0,230,118,0.2);margin-bottom:24px">
        <span style="color:#00e676;background:rgba(0,230,118,0.1);font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px">🟢 ABERTO</span>
        <h1 style="font-size:24px;font-weight:900;margin:12px 0 4px">${CONFIG.jogo}</h1>
        <p style="color:#9ca3af;font-size:14px">${CONFIG.data} · ${CONFIG.hora}</p>
        <p style="color:#6b7280;font-size:12px;margin-top:2px">${CONFIG.estadio}</p>
        <p style="color:#00e676;font-size:20px;font-weight:700;margin-top:12px">R$ ${CONFIG.valor} por palpite</p>
      </div>

      <h2 style="font-weight:700;font-size:18px;margin-bottom:16px">Seu palpite</h2>

      <div style="background:#1e2d3d;border-radius:20px;padding:20px;border:1px solid rgba(255,255,255,0.05);margin-bottom:16px">
        <p style="color:#9ca3af;font-size:11px;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px">Placar final</p>
        <div style="display:flex;align-items:center;gap:16px">
          <div style="flex:1;text-align:center">
            <p style="color:#9ca3af;font-size:11px;margin-bottom:8px">${(time1||'').trim()}</p>
            <input id="p1" type="number" min="0" max="99" placeholder="0"
              style="width:100%;text-align:center;font-size:32px;font-weight:900;background:#0f1923;border:2px solid rgba(0,230,118,0.3);color:white;border-radius:12px;padding:12px 8px;outline:none"
              onfocus="this.style.borderColor='#00e676'" onblur="this.style.borderColor='rgba(0,230,118,0.3)'" />
          </div>
          <span style="font-size:28px;font-weight:900;color:#6b7280;padding-bottom:8px">x</span>
          <div style="flex:1;text-align:center">
            <p style="color:#9ca3af;font-size:11px;margin-bottom:8px">${(time2||'').trim()}</p>
            <input id="p2" type="number" min="0" max="99" placeholder="0"
              style="width:100%;text-align:center;font-size:32px;font-weight:900;background:#0f1923;border:2px solid rgba(0,230,118,0.3);color:white;border-radius:12px;padding:12px 8px;outline:none"
              onfocus="this.style.borderColor='#00e676'" onblur="this.style.borderColor='rgba(0,230,118,0.3)'" />
          </div>
        </div>
      </div>

      <input id="nome" placeholder="Seu nome completo *" value="${nomeAposta}"
        style="${inputStyle()}margin-bottom:16px"
        onfocus="this.style.borderColor='#00e676'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'" />

      <div id="err" style="color:#f87171;font-size:14px;margin-bottom:12px;display:none"></div>

      <button onclick="confirmarPalpite()"
        style="width:100%;background:#00e676;color:#0f1923;font-weight:900;font-size:18px;padding:16px;border-radius:20px;border:none;cursor:pointer">
        Confirmar palpite → R$ ${CONFIG.valor}
      </button>

      <p style="text-align:center;font-size:12px;color:#6b7280;margin-top:16px">Após confirmar você verá as instruções de pagamento via PIX</p>
      <p style="text-align:center;font-size:11px;color:#374151;margin-top:40px">LetsBet · Copa do Mundo 2026 · Apenas diversão</p>
    </div>`;
}

function confirmarPalpite() {
  const nome = document.getElementById('nome').value.trim();
  const v1 = document.getElementById('p1').value;
  const v2 = document.getElementById('p2').value;
  const err = document.getElementById('err');
  if (!nome) { err.textContent='Informe seu nome.'; err.style.display='block'; return; }
  if (v1==='' || v2==='') { err.textContent='Informe o placar completo.'; err.style.display='block'; return; }
  go('pix', { nome, p1:v1, p2:v2 });
}

// ── Página PIX ────────────────────────────────────────────
function pagePix() {
  const msg = encodeURIComponent(
    `⚡ *LetsBet - Meu Palpite!*\n\n` +
    `Jogo: ${CONFIG.jogo}\n` +
    `Data: ${CONFIG.data} às ${CONFIG.hora}\n` +
    `Palpite: *${p1} x ${p2}*\n` +
    `Nome: *${nomeAposta}*\n\n` +
    `Vou fazer o PIX de R$ ${CONFIG.valor} agora! 💸`
  );
  const waLink = CONFIG.whatsapp ? `https://wa.me/${CONFIG.whatsapp}?text=${msg}` : null;

  return `
    <div style="min-height:100vh;padding:32px 16px;max-width:480px;margin:0 auto">
      <div style="margin-bottom:24px;cursor:pointer" onclick="go('home')">${logo()}</div>

      <div style="background:#1e2d3d;border-radius:20px;padding:20px;text-align:center;border:1px solid rgba(0,230,118,0.3);margin-bottom:16px">
        <div style="font-size:48px;margin-bottom:8px">✅</div>
        <h2 style="font-size:20px;font-weight:900;margin-bottom:4px">Palpite anotado!</h2>
        <p style="color:#9ca3af;font-size:14px">Agora faça o PIX para confirmar sua vaga</p>
      </div>

      <div style="background:#1e2d3d;border-radius:20px;padding:16px;border:1px solid rgba(255,255,255,0.05);margin-bottom:16px">
        <p style="color:#9ca3af;font-size:11px;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px">Seu palpite</p>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-weight:700">${CONFIG.jogo}</span>
          <span style="font-weight:900;font-size:24px;color:#00e676">${p1} x ${p2}</span>
        </div>
        <p style="color:#6b7280;font-size:12px;margin-top:4px">por ${nomeAposta}</p>
      </div>

      <div style="background:rgba(234,179,8,0.08);border-radius:20px;padding:20px;border:1px solid rgba(234,179,8,0.3);margin-bottom:16px">
        <h3 style="color:#facc15;font-weight:900;font-size:18px;margin-bottom:16px">💰 Pague via PIX</h3>
        <div style="margin-bottom:12px">
          <p style="color:#9ca3af;font-size:12px;margin-bottom:4px">Valor</p>
          <p style="font-size:32px;font-weight:900">R$ ${CONFIG.valor}</p>
        </div>
        ${CONFIG.pixChave ? `
        <div style="margin-bottom:12px">
          <p style="color:#9ca3af;font-size:12px;margin-bottom:6px">Chave PIX — toque para copiar</p>
          <button onclick="copiarPix(this)"
            style="width:100%;text-align:left;background:#0f1923;border:1px solid rgba(234,179,8,0.4);border-radius:12px;padding:12px 16px;font-family:monospace;font-size:14px;color:#fde047;display:flex;align-items:center;justify-content:space-between;cursor:pointer">
            <span>${CONFIG.pixChave}</span>
            <span id="pix-copy" style="color:#9ca3af;font-size:12px;margin-left:8px;white-space:nowrap">📋 copiar</span>
          </button>
        </div>
        <div>
          <p style="color:#9ca3af;font-size:12px;margin-bottom:4px">Destinatário</p>
          <p style="font-weight:700">${CONFIG.pixNome}</p>
        </div>` : `<p style="color:#fef08a">O organizador vai te enviar a chave PIX em breve.</p>`}
        <div style="background:rgba(234,179,8,0.1);border-radius:12px;padding:12px;margin-top:16px;font-size:12px;color:#fef08a">
          ⚠️ Coloque <strong>${nomeAposta}</strong> na descrição do PIX para identificarmos seu pagamento.
        </div>
      </div>

      ${waLink ? `
      <a href="${waLink}" target="_blank"
        style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#25D366;color:white;font-weight:900;font-size:18px;padding:16px;border-radius:20px;text-decoration:none;margin-bottom:12px">
        📱 Enviar palpite pelo WhatsApp
      </a>
      <p style="text-align:center;font-size:12px;color:#6b7280;margin-bottom:16px">Isso envia seu palpite para o organizador confirmar</p>` : ''}

      <div onclick="go('home')" style="text-align:center;color:#00e676;font-size:14px;cursor:pointer;text-decoration:underline">
        ← Fazer outro palpite
      </div>
    </div>`;
}

function copiarPix(btn) {
  navigator.clipboard?.writeText(CONFIG.pixChave).then(() => {
    const span = document.getElementById('pix-copy');
    if (span) { span.textContent='✅ copiado!'; setTimeout(()=>{ if(document.getElementById('pix-copy')) document.getElementById('pix-copy').textContent='📋 copiar'; },2000); }
  });
}

// ── Admin Login ───────────────────────────────────────────
function pageAdminLogin() {
  return `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
      <div style="margin-bottom:32px">${logo(true)}</div>
      <div style="background:#1e2d3d;border-radius:20px;padding:24px;width:100%;max-width:360px;border:1px solid rgba(255,255,255,0.05)">
        <h2 style="font-weight:700;font-size:18px;margin-bottom:4px">Área do Admin</h2>
        <p style="color:#9ca3af;font-size:12px;margin-bottom:16px">Senha padrão: <code style="color:#00e676">admin123</code></p>
        <input id="adm-pass" type="password" placeholder="Senha"
          onkeydown="if(event.key==='Enter')loginAdmin()"
          style="${inputStyle()}margin-bottom:12px" />
        <div id="adm-err" style="color:#f87171;font-size:14px;margin-bottom:12px;display:none">Senha incorreta.</div>
        <button onclick="loginAdmin()" style="width:100%;background:#00e676;color:#0f1923;font-weight:900;padding:12px;border-radius:12px;border:none;cursor:pointer;font-size:16px">Entrar</button>
        <div onclick="go('home')" style="text-align:center;color:#6b7280;font-size:12px;margin-top:16px;cursor:pointer;text-decoration:underline">← Voltar</div>
      </div>
    </div>`;
}

function loginAdmin() {
  const s = document.getElementById('adm-pass').value;
  const stored = localStorage.getItem(ADMIN_PASS_KEY) || 'admin123';
  if (s === stored) go('admin');
  else document.getElementById('adm-err').style.display='block';
}

// ── Admin Painel ──────────────────────────────────────────
function pageAdmin() {
  const cfg = CONFIG || {};
  return `
    <div style="min-height:100vh;padding:24px 16px;max-width:480px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        ${logo()}
        <button onclick="go('home')" style="color:#9ca3af;font-size:12px;background:none;border:none;cursor:pointer;text-decoration:underline">Sair</button>
      </div>

      <h2 style="font-weight:800;font-size:20px;margin-bottom:4px">⚙️ Configurar Bolão</h2>
      <p style="color:#9ca3af;font-size:13px;margin-bottom:20px">Preencha os dados e clique em <strong style="color:#00e676">Gerar link do bolão</strong>. O link gerado é o que você compartilha!</p>

      <!-- Jogo -->
      <div style="background:#1e2d3d;border-radius:16px;padding:16px;border:1px solid rgba(0,230,118,0.2);margin-bottom:12px">
        <p style="color:#00e676;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px">⚽ Jogo</p>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div>
            <p style="color:#9ca3af;font-size:12px;margin-bottom:4px">Nome do jogo</p>
            <input id="cfg-jogo" value="${cfg.jogo||'Brasil x Haiti'}" style="${inputStyle()}" />
          </div>
          <div style="display:flex;gap:10px">
            <div style="flex:1">
              <p style="color:#9ca3af;font-size:12px;margin-bottom:4px">Data</p>
              <input id="cfg-data" value="${cfg.data||'19/06/2026'}" style="${inputStyle()}" />
            </div>
            <div style="flex:1">
              <p style="color:#9ca3af;font-size:12px;margin-bottom:4px">Hora</p>
              <input id="cfg-hora" value="${cfg.hora||'21h30'}" style="${inputStyle()}" />
            </div>
          </div>
          <div>
            <p style="color:#9ca3af;font-size:12px;margin-bottom:4px">Estádio</p>
            <input id="cfg-estadio" value="${cfg.estadio||''}" style="${inputStyle()}" />
          </div>
          <div>
            <p style="color:#9ca3af;font-size:12px;margin-bottom:4px">Valor da aposta (R$)</p>
            <input id="cfg-valor" type="number" value="${cfg.valor||'10'}" style="${inputStyle()}" />
          </div>
        </div>
      </div>

      <!-- PIX -->
      <div style="background:#1e2d3d;border-radius:16px;padding:16px;border:1px solid rgba(234,179,8,0.2);margin-bottom:12px">
        <p style="color:#facc15;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px">💰 PIX</p>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div>
            <p style="color:#9ca3af;font-size:12px;margin-bottom:4px">Sua chave PIX</p>
            <input id="cfg-pix-chave" placeholder="CPF, e-mail, celular..." value="${cfg.pixChave||''}" style="${inputStyle()}" />
          </div>
          <div>
            <p style="color:#9ca3af;font-size:12px;margin-bottom:4px">Seu nome no banco</p>
            <input id="cfg-pix-nome" placeholder="Ex: Leticia Pessoa" value="${cfg.pixNome||''}" style="${inputStyle()}" />
          </div>
        </div>
      </div>

      <!-- WhatsApp -->
      <div style="background:#1e2d3d;border-radius:16px;padding:16px;border:1px solid rgba(37,211,102,0.2);margin-bottom:12px">
        <p style="color:#25D366;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px">📱 WhatsApp para receber palpites</p>
        <div>
          <p style="color:#9ca3af;font-size:12px;margin-bottom:4px">Seu número (só números, com DDI e DDD)</p>
          <input id="cfg-whatsapp" placeholder="Ex: 5511999999999" value="${cfg.whatsapp||''}" style="${inputStyle()}" />
          <p style="color:#6b7280;font-size:11px;margin-top:4px">55 = Brasil · depois o DDD · depois o número</p>
        </div>
      </div>

      <!-- Status -->
      <div style="background:#1e2d3d;border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.05);margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:12px;cursor:pointer">
          <input id="cfg-ativo" type="checkbox" ${(cfg.ativo!==false)?'checked':''} style="width:20px;height:20px;accent-color:#00e676;cursor:pointer" />
          <span style="font-size:14px">Bolão aberto para apostas</span>
        </label>
      </div>

      <div id="cfg-msg" style="display:none;border-radius:12px;padding:12px;margin-bottom:12px;font-size:13px"></div>

      <button onclick="gerarLink()"
        style="width:100%;background:#00e676;color:#0f1923;font-weight:900;font-size:18px;padding:16px;border-radius:20px;border:none;cursor:pointer">
        🔗 Gerar link do bolão
      </button>

      <!-- Link gerado -->
      <div id="link-box" style="display:none;margin-top:16px;background:#1e2d3d;border-radius:16px;padding:16px;border:1px solid rgba(0,230,118,0.3)">
        <p style="color:#00e676;font-weight:700;margin-bottom:8px">✅ Link gerado! Compartilhe com os participantes:</p>
        <div style="display:flex;gap:8px;align-items:stretch">
          <input id="link-gerado" readonly
            style="flex:1;background:#0f1923;border:1px solid rgba(255,255,255,0.1);color:#9ca3af;border-radius:10px;padding:10px 12px;font-size:12px;outline:none" />
          <button onclick="copiarLink()"
            style="background:#00e676;color:#0f1923;font-weight:700;padding:10px 16px;border-radius:10px;border:none;cursor:pointer;white-space:nowrap">
            📋 Copiar
          </button>
        </div>
        <div id="link-copy-msg" style="color:#00e676;font-size:12px;margin-top:8px;display:none">✅ Link copiado! Agora é só mandar no grupo.</div>
        <p style="color:#6b7280;font-size:11px;margin-top:12px">💡 Envie esse link pelo WhatsApp, grupo, e-mail, onde quiser. Quem abrir o link verá o bolão pronto para apostar.</p>
      </div>

      <!-- Alterar senha -->
      <div style="background:#1e2d3d;border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.05);margin-top:20px">
        <p style="color:#9ca3af;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px">🔐 Alterar senha admin</p>
        <input id="cfg-pass" type="password" placeholder="Nova senha (deixe em branco para manter)" style="${inputStyle()}margin-bottom:8px" />
        <button onclick="salvarSenha()"
          style="width:100%;background:#1e2d3d;color:#9ca3af;border:1px solid rgba(255,255,255,0.1);padding:10px;border-radius:10px;font-size:13px;cursor:pointer">
          Salvar senha
        </button>
        <div id="senha-msg" style="display:none;font-size:12px;margin-top:8px"></div>
      </div>

    </div>`;
}

function gerarLink() {
  const jogo     = document.getElementById('cfg-jogo').value.trim();
  const data     = document.getElementById('cfg-data').value.trim();
  const hora     = document.getElementById('cfg-hora').value.trim();
  const estadio  = document.getElementById('cfg-estadio').value.trim();
  const valor    = document.getElementById('cfg-valor').value.trim();
  const pixChave = document.getElementById('cfg-pix-chave').value.trim();
  const pixNome  = document.getElementById('cfg-pix-nome').value.trim();
  const whatsapp = document.getElementById('cfg-whatsapp').value.replace(/\D/g,'');
  const ativo    = document.getElementById('cfg-ativo').checked;
  const msgEl    = document.getElementById('cfg-msg');

  if (!jogo)     { showMsg(msgEl,'❌ Informe o nome do jogo.','#f87171','rgba(248,113,113,0.1)'); return; }
  if (!pixChave) { showMsg(msgEl,'❌ Informe a chave PIX.','#f87171','rgba(248,113,113,0.1)'); return; }
  if (!pixNome)  { showMsg(msgEl,'❌ Informe o nome do titular PIX.','#f87171','rgba(248,113,113,0.1)'); return; }

  const cfg = { jogo, data, hora, estadio, valor, pixChave, pixNome, whatsapp, ativo };
  const hash = btoa(JSON.stringify(cfg));
  const base = window.location.origin + window.location.pathname;
  const link = base + '#' + hash;

  document.getElementById('link-gerado').value = link;
  document.getElementById('link-box').style.display = 'block';
  document.getElementById('link-copy-msg').style.display = 'none';
  msgEl.style.display = 'none';
  document.getElementById('link-box').scrollIntoView({ behavior:'smooth' });
}

function copiarLink() {
  const link = document.getElementById('link-gerado').value;
  navigator.clipboard?.writeText(link).then(() => {
    document.getElementById('link-copy-msg').style.display = 'block';
  });
}

function salvarSenha() {
  const nova = document.getElementById('cfg-pass').value.trim();
  const msgEl = document.getElementById('senha-msg');
  if (!nova) { showMsg(msgEl,'Nenhuma senha digitada.','#f87171','transparent'); return; }
  if (nova.length < 4) { showMsg(msgEl,'A senha deve ter ao menos 4 caracteres.','#f87171','transparent'); return; }
  localStorage.setItem(ADMIN_PASS_KEY, nova);
  showMsg(msgEl,'✅ Senha alterada!','#00e676','transparent');
}

function showMsg(el, txt, color, bg) {
  el.textContent = txt;
  el.style.color = color;
  el.style.background = bg;
  el.style.display = 'block';
}

// ── Render ────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if      (page==='home')        app.innerHTML = pageHome();
  else if (page==='pix')         app.innerHTML = pagePix();
  else if (page==='admin-login') app.innerHTML = pageAdminLogin();
  else if (page==='admin')       app.innerHTML = pageAdmin();
}

CONFIG = loadConfig();
render();
</script>
</body>
</html>
